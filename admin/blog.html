<!DOCTYPE html>
<html lang="id">
<head>
  <base href="/STRIPMATE/" />
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Blog - STRIPMATE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>const PAGE = 'blog'</script>
  <script src="assets/js/admin.js"></script>
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="logo">STRIP<span>MATE</span></div>
      <nav></nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h1>Manage Blog</h1>
        <button class="btn btn-primary" onclick="openPostModal()">+ Tambah Artikel</button>
      </div>
      <div class="card">
        <div id="blogLoading"></div>
        <div class="table-wrap"><table><thead><tr><th>Title</th><th>Slug</th><th>Author</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead><tbody id="blogTable"></tbody></table></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="postModal"><div class="modal">
    <h2 id="postModalTitle">Tambah Artikel</h2>
    <form id="postForm" onsubmit="return savePost(event)">
      <input type="hidden" id="postId" />
      <div class="form-row"><div class="form-group"><label>Title</label><input type="text" id="pTitle" required/></div><div class="form-group"><label>Slug</label><input type="text" id="pSlug" required/></div></div>
      <div class="form-row"><div class="form-group"><label>Author</label><input type="text" id="pAuthor" /></div><div class="form-group"><label>Image URL</label><input type="url" id="pImage" /></div></div>
      <div class="form-group"><label>Excerpt</label><textarea id="pExcerpt" rows="2"></textarea></div>
      <div class="form-group"><label>Content (HTML)</label><textarea id="pContent" rows="10"></textarea></div>
      <div class="form-row"><div class="form-group"><label>Tags (JSON)</label><input type="text" id="pTags" placeholder='["tips","gunung"]' /></div><div class="form-group"><label><input type="checkbox" id="pPublished" checked /> Published</label></div></div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem">
        <button type="submit" class="btn btn-primary">Simpan</button>
        <button type="button" class="btn btn-secondary" onclick="closePostModal()">Batal</button>
      </div>
    </form>
  </div></div>

  <script>
    let posts = []

    async function init() {
      const session = await requireAdmin()
      if (!session) return
      injectSidebar(PAGE)
      loadPosts()
    }

    async function loadPosts() {
      const loading = document.getElementById('blogLoading')
      loading.innerHTML = '<div class="loading"><div class="spinner"></div>Memuat data...</div>'
      const { data, error } = await supabase.from('blog_posts').select('*').order('created_at', { ascending: false })
      loading.innerHTML = ''
      if (error) { showToast(error.message, 'error'); return }
      posts = data || []
      document.getElementById('blogTable').innerHTML = posts.map(p => `
        <tr>
          <td><strong>${escapeHtml(p.title)}</strong></td>
          <td>${escapeHtml(p.slug)}</td>
          <td>${escapeHtml(p.author || '-')}</td>
          <td>${p.published ? '<span class="badge badge-open">Published</span>' : '<span class="badge badge-closed">Draft</span>'}</td>
          <td>${formatDate(p.created_at)}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="editPost('${p.id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deletePost('${p.id}')">Hapus</button>
          </td>
        </tr>
      `).join('')
    }

    function openPostModal(data) {
      const title = document.getElementById('postModalTitle')
      const form = document.getElementById('postForm')
      form.reset()
      document.getElementById('postId').value = ''

      if (data) {
        title.textContent = 'Edit Artikel'
        document.getElementById('postId').value = data.id
        document.getElementById('pTitle').value = data.title || ''
        document.getElementById('pSlug').value = data.slug || ''
        document.getElementById('pAuthor').value = data.author || ''
        document.getElementById('pImage').value = data.image_url || ''
        document.getElementById('pExcerpt').value = data.excerpt || ''
        document.getElementById('pContent').value = data.content || ''
        document.getElementById('pTags').value = data.tags ? JSON.stringify(data.tags) : ''
        document.getElementById('pPublished').checked = data.published
      } else {
        title.textContent = 'Tambah Artikel'
        document.getElementById('pPublished').checked = true
      }
      document.getElementById('postModal').classList.add('open')
    }

    function closePostModal() {
      document.getElementById('postModal').classList.remove('open')
    }

    async function editPost(id) {
      const { data, error } = await supabase.from('blog_posts').select('*').eq('id', id).single()
      if (error || !data) { showToast('Artikel tidak ditemukan', 'error'); return }
      openPostModal(data)
    }

    async function deletePost(id) {
      if (!confirm('Hapus artikel ini?')) return
      const { error } = await supabase.from('blog_posts').delete().eq('id', id)
      if (error) { showToast(error.message, 'error'); return }
      showToast('Artikel berhasil dihapus')
      loadPosts()
    }

    async function savePost(e) {
      e.preventDefault()
      const id = document.getElementById('postId').value
      let tags = []
      try { tags = JSON.parse(document.getElementById('pTags').value || '[]') } catch(e) {}
      const data = {
        title: document.getElementById('pTitle').value,
        slug: document.getElementById('pSlug').value,
        author: document.getElementById('pAuthor').value || 'STRIPMATE',
        image_url: document.getElementById('pImage').value,
        excerpt: document.getElementById('pExcerpt').value,
        content: document.getElementById('pContent').value,
        tags,
        published: document.getElementById('pPublished').checked,
        published_at: document.getElementById('pPublished').checked ? new Date().toISOString() : null
      }
      const { error } = id
        ? await supabase.from('blog_posts').update(data).eq('id', id)
        : await supabase.from('blog_posts').insert(data)
      if (error) { showToast(error.message, 'error'); return }
      showToast(id ? 'Artikel berhasil diupdate' : 'Artikel berhasil ditambahkan')
      closePostModal()
      loadPosts()
    }

    init().catch(function(err) { console.error(err); showToast(err.message || 'Terjadi kesalahan', 'error'); })
  </script>
</body>
</html>
