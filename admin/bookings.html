<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Bookings - STRIPMATE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="logo">STRIP<span>MATE</span></div>
      <nav>
        <a href="/admin/">&#128202; Dashboard</a>
        <a href="/admin/trips.html">&#127758; Trips</a>
        <a href="/admin/bookings.html" class="active">&#128221; Bookings</a>
        <a href="/admin/payments.html">&#128179; Payments</a>
        <a href="/admin/blog.html">&#128240; Blog</a>
        <a href="/admin/media.html">&#128247; Media</a>
        <a href="/admin/testimonials.html">&#128172; Testimonials</a>
        <a href="/" target="_blank" style="margin-top:auto">&#127760; Lihat Site</a>
        <a href="#" class="logout-link" onclick="logout()">&#10148; Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h1>Manage Bookings</h1>
        <select id="statusFilter" onchange="loadBookings()" style="padding:0.55rem 1rem;border-radius:999px;border:1.5px solid var(--gray);font-family:inherit;font-size:0.82rem">
          <option value="">Semua Status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Invoice</th><th>Peserta</th><th>Trip</th><th>Total</th><th>Status</th><th>Payment</th><th>Aksi</th></tr></thead><tbody id="bookingTable"></tbody></table></div></div>
    </main>
  </div>

  <div class="modal-overlay" id="bookingModal"><div class="modal">
    <h2>Update Booking</h2>
    <input type="hidden" id="bId" />
    <div class="form-group"><label>Status</label><select id="bStatus"><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="cancelled">Cancelled</option></select></div>
    <div class="form-group"><label>Payment Status</label><select id="bPayStatus"><option value="dp">DP</option><option value="paid">Paid</option><option value="refund">Refund</option></select></div>
    <div style="display:flex;gap:0.5rem"><button class="btn btn-primary" onclick="updateBooking()">Simpan</button><button class="btn btn-secondary" onclick="closeModal()">Batal</button></div>
  </div></div>

  <script>
    async function init() {
      await requireAdmin()
      loadBookings()
    }

    async function loadBookings() {
      const filter = document.getElementById('statusFilter').value
      let query = supabase.from('bookings').select('*, profiles(full_name, email), trips(title)').order('created_at', { ascending: false })
      if (filter) query = query.eq('status', filter)
      const { data, error } = await query
      if (error) return
      document.getElementById('bookingTable').innerHTML = (data || []).map(b => `
        <tr>
          <td>${escapeHtml(b.invoice_number)}</td>
          <td>${escapeHtml(b.profiles?.full_name || '')}<br/><span style="font-size:0.75rem;color:var(--text-muted)">${escapeHtml(b.profiles?.email || '')}</span></td>
          <td>${escapeHtml(b.trips?.title || '-')}</td>
          <td>${formatCurrency(b.total_amount)}</td>
          <td>${getStatusBadge(b.status)}</td>
          <td>${getStatusBadge(b.payment_status)}</td>
          <td><button class="btn btn-sm btn-secondary" onclick="openEdit('${b.id}','${b.status}','${b.payment_status}')">Edit</button></td>
        </tr>
      `).join('')
    }

    function openEdit(id, status, payStatus) {
      document.getElementById('bId').value = id
      document.getElementById('bStatus').value = status
      document.getElementById('bPayStatus').value = payStatus
      document.getElementById('bookingModal').classList.add('open')
    }

    function closeModal() {
      document.getElementById('bookingModal').classList.remove('open')
    }

    async function updateBooking() {
      const id = document.getElementById('bId').value
      await supabase.from('bookings').update({
        status: document.getElementById('bStatus').value,
        payment_status: document.getElementById('bPayStatus').value
      }).eq('id', id)
      closeModal()
      loadBookings()
    }

    init()
  </script>
</body>
</html>
