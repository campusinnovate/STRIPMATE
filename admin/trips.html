<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Trips - STRIPMATE Admin</title>
  <link rel="icon" type="image/png" href="STRIPMATELOGO.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/whatsapp.js"></script>
  <script>const PAGE = 'trips'</script>
  <script src="/assets/js/admin.js"></script>
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="logo"><img src="../Logo stripmate.png" alt="STRIPMATE"/></div>
      <nav></nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h1>Manage Trips</h1>
        <button class="btn btn-primary" onclick="openTripModal()">+ Tambah Trip</button>
      </div>
      <div class="card">
        <div id="tripLoading"></div>
        <div class="table-wrap" id="tripTableWrap"><table><thead><tr><th>Title</th><th>Date</th><th>Price</th><th>Kuota</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="tripTable"></tbody></table></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="tripModal"><div class="modal">
    <h2 id="tripModalTitle">Tambah Trip</h2>
    <form id="tripForm" onsubmit="return saveTrip(event)">
      <input type="hidden" id="tripId" />
      <div class="form-row"><div class="form-group"><label>Title</label><input type="text" id="tTitle" required/></div><div class="form-group"><label>Slug</label><input type="text" id="tSlug" required/></div></div>
      <div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="tDate" required/></div><div class="form-group"><label>Price (Rp)</label><input type="number" id="tPrice" required/></div></div>
      <div class="form-row"><div class="form-group"><label>Kuota</label><input type="number" id="tKuota" /></div><div class="form-group"><label>Meeting Point</label><input type="text" id="tMeeting" /></div></div>
      <div class="form-row"><div class="form-group"><label>Status</label><select id="tStatus"><option value="open">Open</option><option value="closed">Closed</option><option value="full">Full</option></select></div><div class="form-group"><label>Image URL</label><input type="url" id="tImage" placeholder="https://..." /></div></div>
      <div class="form-group"><label>Description</label><textarea id="tDesc" rows="3"></textarea></div>
      <div class="form-row"><div class="form-group"><label>Location</label><input type="text" id="tLocation" placeholder="Garut, Jawa Barat" /></div><div class="form-group"><label>Height</label><input type="text" id="tHeight" placeholder="2.665 MDPL" /></div></div>
      <div class="form-row"><div class="form-group"><label>Via</label><input type="text" id="tVia" placeholder="Travel Elf dari Meeting Point" /></div><div class="form-group"><label>Estimate</label><input type="text" id="tEstimate" placeholder="Pendakian 3-4 jam" /></div></div>
      <div class="form-group"><label>Route</label><textarea id="tRoute" rows="2" placeholder="Jalur pendakian..."></textarea></div>
      <div class="form-group"><label>Facilities (1 per baris)</label><textarea id="tFacilities" rows="3" placeholder="Transport PP&#10;Tiket masuk&#10;Tour Leader"></textarea></div>
      <div class="form-group"><label>Exclude / Tidak Termasuk (1 per baris)</label><textarea id="tExclude" rows="2" placeholder="Pengeluaran pribadi&#10;Sewa alat"></textarea></div>
      <div class="form-group"><label>Rundown / Jadwal (1 per baris)</label><textarea id="tRundown" rows="4" placeholder="18.00 - Meeting Point&#10;18.30 - Berangkat"></textarea></div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem">
        <button type="submit" class="btn btn-primary" id="tripSaveBtn">Simpan</button>
        <button type="button" class="btn btn-secondary" onclick="closeTripModal()">Batal</button>
      </div>
    </form>
  </div></div>

  <script>
    async function init() {
      const session = await requireAdmin()
      if (!session) return
      injectSidebar(PAGE)
      loadTrips()
    }

    async function loadTrips() {
      const loading = document.getElementById('tripLoading')
      loading.innerHTML = '<div class="loading"><div class="spinner"></div>Memuat data...</div>'
      const { data, error } = await supabaseClient.from('trips').select('*').order('date', { ascending: true })
      loading.innerHTML = ''
      if (error) { showToast(error.message, 'error'); return }
      document.getElementById('tripTable').innerHTML = (data || []).map(t => `
        <tr>
          <td><strong>${escapeHtml(t.title)}</strong><br/><span style="font-size:0.75rem;color:var(--text-muted)">${escapeHtml(t.location || '')}</span></td>
          <td>${t.date || '-'}</td>
          <td>${formatCurrency(t.price)}</td>
          <td>${t.kuota || '-'}</td>
          <td>${getStatusBadge(t.status)}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="editTrip('${t.id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTrip('${t.id}')">Hapus</button>
          </td>
        </tr>
      `).join('')
    }

    function openTripModal(data) {
      const modal = document.getElementById('tripModal')
      const title = document.getElementById('tripModalTitle')
      const form = document.getElementById('tripForm')
      form.reset()
      document.getElementById('tripId').value = ''

      if (data) {
        title.textContent = 'Edit Trip'
        document.getElementById('tripId').value = data.id
        document.getElementById('tTitle').value = data.title || ''
        document.getElementById('tSlug').value = data.slug || ''
        document.getElementById('tDate').value = data.date || ''
        document.getElementById('tPrice').value = data.price || ''
        document.getElementById('tKuota').value = data.kuota || ''
        document.getElementById('tMeeting').value = data.meeting_point || ''
        document.getElementById('tStatus').value = data.status || 'open'
        document.getElementById('tImage').value = data.image_url || ''
        document.getElementById('tDesc').value = data.description || ''
        document.getElementById('tLocation').value = data.location || ''
        document.getElementById('tHeight').value = data.height || ''
        document.getElementById('tVia').value = data.via || ''
        document.getElementById('tEstimate').value = data.estimate || ''
        document.getElementById('tRoute').value = data.route || ''
        document.getElementById('tFacilities').value = (data.facilities || []).join('\n')
        document.getElementById('tExclude').value = (data.exclude || []).join('\n')
        document.getElementById('tRundown').value = (data.rundown || []).join('\n')
      } else {
        title.textContent = 'Tambah Trip'
      }
      modal.classList.add('open')
    }

    function closeTripModal() {
      document.getElementById('tripModal').classList.remove('open')
    }

    async function editTrip(id) {
      const { data, error } = await supabaseClient.from('trips').select('*').eq('id', id).single()
      if (error || !data) { showToast('Trip tidak ditemukan', 'error'); return }
      openTripModal(data)
    }

    async function deleteTrip(id) {
      if (!confirm('Hapus trip ini? Semua data booking, pembayaran, e-ticket, merchandise, dan sertifikat terkait juga akan terhapus. Tindakan ini tidak bisa dibatalkan.')) return

      try {
        const { data: bookings } = await supabaseClient
          .from('bookings').select('id').eq('trip_id', id)
        const ids = (bookings || []).map(b => b.id)

        if (ids.length > 0) {
          await supabaseClient.from('payments').delete().in('booking_id', ids)
          await supabaseClient.from('e_tickets').delete().in('booking_id', ids)
          await supabaseClient.from('merchandise').delete().in('booking_id', ids)
          await supabaseClient.from('bookings').delete().in('id', ids)
        }

        await supabaseClient.from('certificates').delete().eq('trip_id', id)

        const { error } = await supabaseClient.from('trips').delete().eq('id', id)
        if (error) throw error

        showToast('Trip dan semua data terkait berhasil dihapus')
        loadTrips()
      } catch (e) {
        showToast(e.message || 'Gagal menghapus trip', 'error')
      }
    }

    function splitLines(val) {
      return val.split('\n').map(s => s.trim()).filter(Boolean)
    }

    async function saveTrip(e) {
      e.preventDefault()
      const id = document.getElementById('tripId').value
      const data = {
        title: document.getElementById('tTitle').value,
        slug: document.getElementById('tSlug').value,
        date: document.getElementById('tDate').value,
        price: parseFloat(document.getElementById('tPrice').value),
        kuota: parseInt(document.getElementById('tKuota').value) || null,
        meeting_point: document.getElementById('tMeeting').value,
        status: document.getElementById('tStatus').value,
        image_url: document.getElementById('tImage').value,
        description: document.getElementById('tDesc').value,
        location: document.getElementById('tLocation').value,
        height: document.getElementById('tHeight').value,
        via: document.getElementById('tVia').value,
        estimate: document.getElementById('tEstimate').value,
        route: document.getElementById('tRoute').value,
        facilities: splitLines(document.getElementById('tFacilities').value),
        exclude: splitLines(document.getElementById('tExclude').value),
        rundown: splitLines(document.getElementById('tRundown').value)
      }
      const { error } = id
        ? await supabaseClient.from('trips').update(data).eq('id', id)
        : await supabaseClient.from('trips').insert(data)
      if (error) { showToast(error.message, 'error'); return }
      showToast(id ? 'Trip berhasil diupdate' : 'Trip berhasil ditambahkan')
      closeTripModal()
      loadTrips()
    }

    init().catch(function(err) { console.error(err); showToast(err.message || 'Terjadi kesalahan', 'error'); })
  </script>
</body>
</html>
