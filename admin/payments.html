<!DOCTYPE html>
<html lang="id">
<head>
  <base href="/STRIPMATE/" />
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Payments - STRIPMATE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>const PAGE = 'payments'</script>
  <script src="assets/js/admin.js"></script>
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="logo">STRIP<span>MATE</span></div>
      <nav></nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h1>Manage Payments</h1>
        <select id="payFilter" class="filter-select" onchange="loadPayments()">
          <option value="">Semua</option>
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="card">
        <div id="payLoading"></div>
        <div class="table-wrap"><table><thead><tr><th>Invoice</th><th>Peserta</th><th>Metode</th><th>Amount</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead><tbody id="payTable"></tbody></table></div>
      </div>
    </main>
  </div>

  <script>
    async function init() {
      const session = await requireAdmin()
      if (!session) return
      injectSidebar(PAGE)
      loadPayments()
    }

    async function loadPayments() {
      const loading = document.getElementById('payLoading')
      loading.innerHTML = '<div class="loading"><div class="spinner"></div>Memuat data...</div>'
      const filter = document.getElementById('payFilter').value
      let query = supabaseClient
        .from('payments')
        .select('*, bookings:booking_id(invoice_number, user_id)')
        .order('created_at', { ascending: false })
      if (filter) query = query.eq('status', filter)
      const { data: payments, error } = await query
      loading.innerHTML = ''
      if (error) { showToast(error.message, 'error'); return }
      const userIds = [...new Set((payments || []).map(p => p.bookings?.user_id).filter(Boolean))]
      let profileMap = {}
      if (userIds.length > 0) {
        const { data: profiles } = await supabaseClient.from('profiles').select('id, full_name').in('id', userIds)
        if (profiles) profiles.forEach(p => { profileMap[p.id] = p.full_name })
      }
      document.getElementById('payTable').innerHTML = (payments || []).map(p => `
        <tr>
          <td>${escapeHtml(p.bookings?.invoice_number || '-')}</td>
          <td>${escapeHtml(profileMap[p.bookings?.user_id] || '-')}</td>
          <td>${p.method || '-'}</td>
          <td>${formatCurrency(p.amount)}</td>
          <td>${getStatusBadge(p.status)}</td>
          <td>${formatDate(p.created_at)}</td>
          <td>
            ${p.status === 'pending' ? `
              <button class="btn btn-sm btn-green" onclick="confirmPay('${p.id}')">Confirm</button>
              <button class="btn btn-sm btn-danger" onclick="cancelPay('${p.id}')">Tolak</button>
            ` : '-'}
          </td>
        </tr>
      `).join('')
    }

    async function confirmPay(id) {
      if (!confirm('Konfirmasi pembayaran ini?')) return
      const { error: payUpdateError } = await supabaseClient.from('payments').update({ status: 'paid', paid_at: new Date().toISOString() }).eq('id', id)
      if (payUpdateError) { showToast(payUpdateError.message, 'error'); return }
      const { data: pay, error: paySelectError } = await supabaseClient.from('payments').select('booking_id').eq('id', id).maybeSingle()
      if (paySelectError) { showToast(paySelectError.message, 'error'); return }
      if (pay) {
        const { error: bookingError } = await supabaseClient.from('bookings').update({ payment_status: 'paid', status: 'confirmed' }).eq('id', pay.booking_id)
        if (bookingError) { showToast(bookingError.message, 'error'); return }
      }
      showToast('Pembayaran dikonfirmasi')
      loadPayments()
    }

    async function cancelPay(id) {
      if (!confirm('Batalkan pembayaran ini?')) return
      const { error } = await supabaseClient.from('payments').update({ status: 'cancelled' }).eq('id', id)
      if (error) { showToast(error.message, 'error'); return }
      showToast('Pembayaran dibatalkan')
      loadPayments()
    }

    init().catch(function(err) { console.error(err); showToast(err.message || 'Terjadi kesalahan', 'error'); })
  </script>
</body>
</html>
