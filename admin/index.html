<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Dashboard - STRIPMATE</title>
  <link rel="icon" type="image/png" href="../STRIPMATELOGO.png" />
  <link rel="apple-touch-icon" href="../STRIPMATELOGO.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/whatsapp.js"></script>
  <script>const PAGE = 'dashboard'</script>
  <script src="/assets/js/admin.js"></script>
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="logo"><img src="../Logo stripmate.png" alt="STRIPMATE"/></div>
      <nav></nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h1>Dashboard</h1>
        <div class="user-info" id="adminInfo">Loading...</div>
      </div>
      <div class="card-grid" id="statCards"></div>
      <div class="card-grid" id="ticketStatCards" style="margin-bottom:0"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem">
        <div class="card">
          <h3>Booking Terbaru</h3>
          <div id="recentBookings"></div>
        </div>
        <div class="card">
          <h3>Pembayaran Terbaru</h3>
          <div id="recentPayments"></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem">
        <div class="card">
          <h3>Scan E-Ticket Terbaru</h3>
          <div id="recentScans"></div>
        </div>
        <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem">
          <div style="font-size:2.5rem;margin-bottom:0.5rem">📷</div>
          <h3 style="margin-bottom:0.25rem">Scan Tiket Peserta</h3>
          <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem">Gunakan kamera untuk scan QR code e-tiket peserta</p>
          <a href="/admin/scanner.html" class="btn btn-primary btn-lg">Buka Scanner</a>
        </div>
      </div>
    </main>
  </div>
  <script>
    async function init() {
      const session = await requireAdmin()
      if (!session) return
      injectSidebar(PAGE)
      document.getElementById('adminInfo').textContent = session.profile.full_name || 'Admin'

      try {
        const [users, bookings, payments, trips, channels, ticketStats, recentScans] = await Promise.all([
          supabaseClient.from('profiles').select('id', { count: 'exact', head: true }),
          supabaseClient.from('bookings').select('id', { count: 'exact', head: true }),
          supabaseClient.from('payments').select('id, amount, status, created_at, booking_id', { count: 'exact' }).order('created_at', { ascending: false }).limit(10),
          supabaseClient.from('trips').select('title, date, status').order('date', { ascending: true }).limit(5),
          supabaseClient.from('payment_channels').select('id', { count: 'exact', head: true }).eq('is_active', true),
          supabaseClient.from('e_tickets').select('status', { count: 'exact', head: false }),
          supabaseClient.from('e_tickets').select('ticket_number, status, scanned_at, bookings:booking_id(invoice_number)').not('scanned_at', 'is', null).order('scanned_at', { ascending: false }).limit(5)
        ])

        const allTickets = ticketStats.data || []
        const totalTickets = allTickets.length
        const scannedTickets = allTickets.filter(t => t.status === 'scanned').length
        const activeTickets = totalTickets - scannedTickets

        document.getElementById('statCards').innerHTML = `
          <a href="/admin/participants.html" class="stat-card"><div class="label">Total Peserta</div><div class="value">${users.count || 0}</div></a>
          <a href="/admin/bookings.html" class="stat-card"><div class="label">Total Booking</div><div class="value">${bookings.count || 0}</div></a>
          <a href="/admin/payment-channels.html" class="stat-card"><div class="label">Channel Aktif</div><div class="value">${channels.count || 0}</div></a>
          <a href="/admin/calendar.html" class="stat-card"><div class="label">Revenue</div><div class="value">${formatCurrency(payments.data ? payments.data.reduce((s, p) => s + (p.amount || 0), 0) : 0)}</div></a>
        `

        document.getElementById('ticketStatCards').innerHTML = `
          <a href="/admin/scanner.html" class="stat-card"><div class="label">Total E-Ticket</div><div class="value">${totalTickets}</div></a>
          <a href="/admin/scanner.html" class="stat-card"><div class="label">Sudah Scan</div><div class="value">${scannedTickets}</div><div class="sub">${totalTickets > 0 ? Math.round(scannedTickets/totalTickets*100) : 0}% dari total</div></a>
          <a href="/admin/scanner.html" class="stat-card"><div class="label">Belum Scan</div><div class="value">${activeTickets}</div><div class="sub">Siap diverifikasi</div></a>
        `

        const recentB = document.getElementById('recentBookings')
        if (bookings.count > 0) {
          const { data: recentBookingData } = await supabaseClient
            .from('bookings')
            .select('invoice_number, status, total_amount, created_at, profiles:user_id(full_name)')
            .order('created_at', { ascending: false })
            .limit(5)
          if (recentBookingData && recentBookingData.length > 0) {
            recentB.innerHTML = recentBookingData.map(b => `
              <div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--gray);font-size:0.85rem">
                <span>${escapeHtml(b.invoice_number)}<br/><span style="font-size:0.75rem;color:var(--text-muted)">${escapeHtml(b.profiles?.full_name || '')}</span></span>
                <span>${getStatusBadge(b.status)}</span>
              </div>
            `).join('')
          } else {
            recentB.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Belum ada booking.</p>'
          }
        } else {
          recentB.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Belum ada booking.</p>'
        }

        const recentScansContainer = document.getElementById('recentScans')
        const scanData = recentScans.data || []
        if (scanData.length > 0) {
          recentScansContainer.innerHTML = scanData.map(s => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid var(--gray);font-size:0.82rem">
              <div>
                <strong style="font-size:0.85rem;color:var(--text)">${escapeHtml(s.ticket_number)}</strong>
                <br/><span style="font-size:0.72rem;color:var(--text-muted)">${s.scanned_at ? formatDate(s.scanned_at) : '-'} &middot; ${getTicketStatusBadge(s.status)}</span>
              </div>
              <span style="font-size:0.75rem;color:var(--text-muted)">${s.bookings?.invoice_number || ''}</span>
            </div>
          `).join('')
        } else {
          recentScansContainer.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Belum ada scan e-tiket.</p>'
        }

        const recentP = document.getElementById('recentPayments')
        if (payments.data && payments.data.length > 0) {
          recentP.innerHTML = payments.data.map(p => `
            <div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--gray);font-size:0.85rem">
              <span>${formatCurrency(p.amount)}<br/><span style="font-size:0.75rem;color:var(--text-muted)">${formatDate(p.created_at)}</span></span>
              <span>${getStatusBadge(p.status)}</span>
            </div>
          `).join('')
        } else {
          recentP.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Belum ada pembayaran.</p>'
        }
      } catch (err) {
        showToast(err.message || 'Gagal memuat dashboard', 'error')
      }
    }
    init()
  </script>
</body>
</html>
