<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - STRIPMATE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/whatsapp.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--navy:#1B2A4A;--green:#2D6A4F;--orange:#F97316;--cream:#FFF8F0;--gray:#E9ECEF;--text:#0F172A;--text-muted:#64748B;--white:#FFFFFF;--shadow:0 4px 24px rgba(0,0,0,0.06);--radius:1rem;--radius-sm:0.6rem}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    h1,h2{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;letter-spacing:-0.03em}
    .auth-wrap{max-width:440px;width:100%;background:var(--white);border-radius:var(--radius);padding:2.5rem;box-shadow:var(--shadow)}
    .logo{text-align:center;margin-bottom:0.5rem}
    .logo img{height:36px;width:auto;display:inline-block}
    .subtitle{text-align:center;font-size:0.88rem;color:var(--text-muted);margin-bottom:2rem}
    .tab{display:flex;border:1px solid var(--gray);border-radius:0.5rem;overflow:hidden;margin-bottom:1.5rem}
    .tab button{flex:1;padding:0.6rem;border:none;background:transparent;font-family:inherit;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all.2s;color:var(--text-muted)}
    .tab button.active{background:var(--navy);color:#fff}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;color:var(--navy)}
    .form-group input{width:100%;padding:0.7rem 1rem;border-radius:0.5rem;border:1.5px solid var(--gray);background:var(--cream);font-family:inherit;font-size:0.9rem;color:var(--text);transition:border-color.2s}
    .form-group input:focus{outline:none;border-color:var(--orange)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;width:100%;padding:0.8rem;border-radius:999px;font-weight:700;font-size:0.9rem;border:none;cursor:pointer;transition:all.2s;font-family:inherit}
    .btn-primary{background:var(--orange);color:#fff}
    .btn-primary:hover{background:var(--orange);box-shadow:0 4px 16px rgba(249,115,22,0.25)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
    .msg{padding:0.75rem;border-radius:0.5rem;font-size:0.82rem;margin-bottom:1rem;display:none}
    .msg.error{display:block;background:#FEE2E2;color:#EF4444}
    .msg.success{display:block;background:#D1FAE5;color:#059669}
    .back-link{display:block;text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--text-muted)}
    .back-link a{color:var(--orange);font-weight:600;text-decoration:none}
    .form-toggle{display:none}
    .form-toggle.active{display:block}
    .shake{animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="index.html" class="logo" onclick="pageTransition(this.href);return false"><img src="Logo stripmate.png" alt="STRIPMATE" style="height:36px;width:auto;display:inline-block"/></a>
    <p class="subtitle">Masuk ke dashboard peserta STRIPMATE</p>

    <div class="tab">
      <button class="active" onclick="switchTab('login')">Masuk</button>
      <button onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="loginForm" class="form-toggle active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="nama@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Min. 6 karakter" />
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">Masuk</button>
    </div>

    <div id="registerForm" class="form-toggle">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="regName" placeholder="Nama lengkap" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="nama@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 karakter" />
      </div>
      <button class="btn btn-primary" onclick="handleRegister()">Daftar</button>
    </div>

    <div class="back-link">
      <a href="index.html" onclick="pageTransition(this.href);return false">&larr; Kembali ke Beranda</a>
    </div>
  </div>

  <script>
    if (typeof pageTransition !== 'function') {
      window.pageTransition = function(url) { window.location.href = url }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.form-toggle').forEach(f => f.classList.remove('active'))
      if (tab === 'login') {
        document.querySelector('.tab button:first-child').classList.add('active')
        document.getElementById('loginForm').classList.add('active')
      } else {
        document.querySelector('.tab button:last-child').classList.add('active')
        document.getElementById('registerForm').classList.add('active')
      }
      const m = document.getElementById('msg')
      if (m) m.style.display = 'none'
    }

    function showLoadingOverlay(redirectUrl) {
      const overlay = document.createElement('div')
      overlay.id = 'loadingOverlay'
      Object.assign(overlay.style, {
        position:'fixed', inset:'0', zIndex:'99999',
        background:'rgba(27,42,74,0.85)', backdropFilter:'blur(8px)',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        gap:'1rem', opacity:'0', transition:'opacity 0.4s ease'
      })
      overlay.innerHTML = '<style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}</style><div style="width:48px;height:48px;border:4px solid rgba(255,255,255,0.15);border-top:4px solid #F97316;border-radius:50%;animation:spin 0.8s linear infinite"></div><p style="color:#fff;font-family:\'Plus Jakarta Sans\',sans-serif;font-size:1.1rem;font-weight:600;animation:pulse 1.5s ease-in-out infinite">Tunggu sebentar, anda akan dialihkan ke dashboard...</p>'
      document.body.appendChild(overlay)
      requestAnimationFrame(() => overlay.style.opacity = '1')
      setTimeout(() => { window.location.href = redirectUrl }, 1500)
    }

    function shakeForm(id) {
      const el = document.getElementById(id)
      if (!el) return
      el.classList.add('shake')
      setTimeout(() => el.classList.remove('shake'), 500)
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim()
      const password = document.getElementById('loginPassword').value
      if (!email || !password) {
        shakeForm('loginForm')
        return showToast('Isi email dan password.', 'error')
      }
      
      try {
        const data = await login(email, password)
        let profile = await getProfile(data.user.id)
        
        if (!profile) {
          await supabaseClient.from('profiles').insert({
            id: data.user.id,
            email: email,
            full_name: '',
            role: 'peserta'
          }).maybeSingle()
          profile = await getProfile(data.user.id)
        }
        
        if (profile && profile.role === 'admin') {
          showLoadingOverlay('admin/index.html')
        } else {
          showLoadingOverlay('dashboard.html')
        }
      } catch (e) {
        showToast(e.message || 'Login gagal. Periksa email dan password.', 'error')
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value.trim()
      const email = document.getElementById('regEmail').value.trim()
      const password = document.getElementById('regPassword').value
      if (!name) {
        shakeForm('registerForm')
        return showToast('Isi nama lengkap.', 'error')
      }
      if (!email) {
        shakeForm('registerForm')
        return showToast('Isi email.', 'error')
      }
      if (password.length < 6) {
        shakeForm('registerForm')
        return showToast('Password minimal 6 karakter.', 'error')
      }
      try {
        const data = await register(email, password, name)
        if (!data?.session) {
          await login(email, password)
        }
        showLoadingOverlay('dashboard.html')
      } catch (e) {
        showToast(e.message || 'Pendaftaran gagal.', 'error')
      }
    }

    document.querySelectorAll('input').forEach(inp => inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginActive = document.getElementById('loginForm').classList.contains('active')
        if (loginActive) handleLogin(); else handleRegister()
      }
    }))
  </script>
</body>
</html>
