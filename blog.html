<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog & Journal - STRIPMATE</title>
  <meta name="description" content="Tips perjalanan, panduan hiking, dan cerita seru dari peserta STRIPMATE. Baca artikel terbaru seputar outdoor, traveling, dan pengalaman open trip." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/utils.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--navy:#1B2A4A;--green:#2D6A4F;--orange:#F97316;--cream:#FFF8F0;--gray:#E9ECEF;--gray-light:#F8F9FA;--text:#0F172A;--text-muted:#64748B;--white:#FFFFFF;--shadow:0 4px 24px rgba(0,0,0,0.06);--radius:1rem;--radius-sm:0.6rem}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
    h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;letter-spacing:-0.03em}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 0;background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(27,42,74,0.06)}
    nav .container{max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.35rem;font-weight:800;color:var(--navy);text-decoration:none}
    .logo span{color:var(--orange)}
    nav ul{display:flex;gap:1.25rem;list-style:none;align-items:center}
    nav ul a{color:var(--text-muted);font-size:0.85rem;font-weight:500;transition:color.2s}
    nav ul a:hover{color:var(--navy)}
    .nav-cta{background:var(--orange);color:#fff!important;padding:0.5rem 1.25rem;border-radius:999px;font-weight:700;font-size:0.82rem}

    .container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
    main{padding-top:6rem;padding-bottom:3rem}

    .blog-header{text-align:center;padding:3rem 0 2rem}
    .blog-header h1{font-size:2rem;color:var(--navy);margin-bottom:0.5rem}
    .blog-header p{color:var(--text-muted);max-width:500px;margin:0 auto}

    .post-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
    .post-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all.3s}
    .post-card:hover{transform:translateY(-4px);box-shadow:0 12px 48px rgba(0,0,0,0.1)}
    .post-card .thumb{height:200px;overflow:hidden}
    .post-card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform.5s}
    .post-card:hover .thumb img{transform:scale(1.05)}
    .post-card .body{padding:1.25rem 1.5rem 1.5rem}
    .post-card .body .tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.5rem}
    .post-card .body .tags span{background:rgba(45,106,79,0.08);color:var(--green);padding:0.15rem 0.5rem;border-radius:999px;font-size:0.7rem;font-weight:600}
    .post-card .body h3{font-size:1.05rem;color:var(--navy);margin-bottom:0.3rem;line-height:1.3}
    .post-card .body .meta{font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem}
    .post-card .body p{font-size:0.85rem;color:var(--text-muted);line-height:1.6}
    .post-card .body .read-more{display:inline-block;margin-top:0.75rem;font-size:0.82rem;font-weight:600;color:var(--orange);text-decoration:none}

    .loading{text-align:center;padding:3rem;color:var(--text-muted)}
    .spinner{width:36px;height:36px;border:3px solid var(--gray);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 0.75rem}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .post-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">STRIP<span>MATE</span></a>
      <ul>
        <li><a href="/">Beranda</a></li>
        <li><a href="/blog.html" style="color:var(--navy);font-weight:600">Blog</a></li>
        <li><a href="/login.html" class="nav-cta">Dashboard</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="blog-header">
        <h1>Blog & Journal</h1>
        <p>Tips perjalanan, panduan outdoor, dan cerita seru dari komunitas STRIPMATE.</p>
      </div>
      <div id="blogList" class="post-grid">
        <div class="loading"><div class="spinner"></div><p>Memuat artikel...</p></div>
      </div>
    </div>
  </main>

  <script>
    async function loadBlog() {
      const container = document.getElementById('blogList')
      const { data: posts, error } = await supabase
        .from('blog_posts')
        .select('*')
        .eq('published', true)
        .order('published_at', { ascending: false })

      if (error || !posts || posts.length === 0) {
        container.innerHTML = '<div class="loading"><p>Belum ada artikel. Nantikan konten menarik dari STRIPMATE!</p></div>'
        return
      }

      container.innerHTML = posts.map(p => `
        <a href="/blog-post.html?slug=${p.slug}" class="post-card" style="text-decoration:none">
          <div class="thumb"><img src="${p.image_url || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80'}" alt="${escapeHtml(p.title)}" loading="lazy"/></div>
          <div class="body">
            <div class="tags">${(p.tags || []).map(t => `<span>${escapeHtml(t)}</span>`).join('')}</div>
            <h3>${escapeHtml(p.title)}</h3>
            <div class="meta">${formatDate(p.published_at)} &middot; ${escapeHtml(p.author || 'STRIPMATE')}</div>
            <p>${escapeHtml(p.excerpt || '')}</p>
            <span class="read-more">Baca Selengkapnya &rarr;</span>
          </div>
        </a>
      `).join('')
    }

    loadBlog()
  </script>
</body>
</html>
