  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--navy:#1B2A4A;--green:#2D6A4F;--orange:#F97316;--cream:#FFF8F0;--gray:#E9ECEF;--gray-light:#F8F9FA;--text:#0F172A;--text-muted:#64748B;--white:#FFFFFF;--glass-bg:rgba(255,255,255,0.78);--glass-border:rgba(255,255,255,0.3);--glass-shadow:0 8px 32px rgba(0,0,0,0.06);--radius:1rem;--radius-sm:0.6rem}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(45,106,79,0.04) 0%,transparent 50%);color:var(--text)}
    h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;letter-spacing:-0.03em}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 0;background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(27,42,74,0.06)}
    nav .container{max-width:800px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center}
    .logo img{height:32px;width:auto;display:block}
    nav a{color:var(--text-muted);font-size:0.85rem;font-weight:500}
    nav a:hover{color:var(--navy)}

    .container{max-width:800px;margin:0 auto;padding:0 1.5rem}
    main{padding-top:5rem;padding-bottom:3rem}
    article{padding-top:2rem}
    .post-header{margin-bottom:2rem}
    .post-header .tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem}
    .post-header .tags span{background:rgba(45,106,79,0.08);color:var(--green);padding:0.15rem 0.5rem;border-radius:999px;font-size:0.72rem;font-weight:600}
    .post-header h1{font-size:2rem;color:var(--navy);line-height:1.2;margin-bottom:0.5rem}
    .post-header .meta{font-size:0.82rem;color:var(--text-muted)}
    .post-image{width:100%;height:350px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:2rem}
    .post-content{font-size:1rem;line-height:1.8;color:var(--text)}
    .post-content p{margin-bottom:1.25rem}
    .post-content h2{font-size:1.3rem;color:var(--navy);margin:2rem 0 0.75rem}
    .post-content h3{font-size:1.1rem;color:var(--navy);margin:1.5rem 0 0.5rem}
    .post-content ul,.post-content ol{padding-left:1.5rem;margin-bottom:1.25rem}
    .post-content li{margin-bottom:0.4rem}
    .post-content strong{color:var(--navy)}
    .post-content blockquote{border-left:3px solid var(--orange);padding:1rem 1.25rem;margin:1.5rem 0;background:rgba(249,115,22,0.04);border-radius:0 0.5rem 0.5rem 0;font-style:italic;color:var(--text-muted)}
    .post-content img{width:100%;border-radius:var(--radius-sm);margin:1.5rem 0}

    .back-link{display:inline-flex;align-items:center;gap:0.4rem;color:var(--orange);font-weight:600;font-size:0.88rem;margin-bottom:1rem}
    .back-link:hover{text-decoration:underline}

    .loading{text-align:center;padding:4rem;color:var(--text-muted)}
    .spinner{width:36px;height:36px;border:3px solid var(--gray);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 0.75rem}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .post-header h1{font-size:1.5rem}
      .post-image{height:220px}
    }

<body>
  <nav>
    <div class="container">
      <a href="index.html" class="logo" onclick="pageTransition(this.href);return false"><img src="Logo stripmate.png" alt="STRIPMATE" style="height:32px;width:auto;display:block"/></a>
      <a href="blog.html" onclick="pageTransition(this.href);return false">Blog</a>
    </div>
  </nav>

  <main>
    <div class="container">
      <a href="blog.html" class="back-link" onclick="pageTransition(this.href);return false">&larr; Kembali ke Blog</a>
      <div id="loadingPost" class="loading"><div class="spinner"></div><p>Memuat artikel...</p></div>
      <article id="postContent" style="display:none"></article>
    </div>
  </main>

  <script>
    async function loadPost() {
      const slug = getQueryParam('slug')
      if (!slug) {
        document.getElementById('loadingPost').innerHTML = '<p>Artikel tidak ditemukan.</p>'
        return
      }
      const { data: post, error } = await supabaseClient
        .from('blog_posts')
        .select('*')
        .eq('slug', slug)
        .eq('published', true)
        .single()
      if (error || !post) {
        document.getElementById('loadingPost').innerHTML = '<p>Artikel tidak ditemukan.</p>'
        return
      }
      document.title = `${escapeHtml(post.title)} - STRIPMATE`
      const meta = document.querySelector('meta[name="description"]')
      if (meta) meta.content = post.excerpt || ''
      const ogTitle = document.querySelector('meta[property="og:title"]')
      const ogDesc = document.querySelector('meta[property="og:description"]')
      const ogImg = document.querySelector('meta[property="og:image"]')
      const ogUrl = document.querySelector('meta[property="og:url"]')
      const twTitle = document.querySelector('meta[name="twitter:title"]')
      const twDesc = document.querySelector('meta[name="twitter:description"]')
      if (ogTitle) ogTitle.content = `${escapeHtml(post.title)} - STRIPMATE`
      if (ogDesc) ogDesc.content = post.excerpt || ''
      if (ogImg) ogImg.content = post.image_url || 'https://stripmate.id/STRIPMATELOGO.png'
      if (ogUrl) ogUrl.content = `https://stripmate.id/blog-post.html?slug=${post.slug}`
      if (twTitle) twTitle.content = `${escapeHtml(post.title)} - STRIPMATE`
      if (twDesc) twDesc.content = post.excerpt || ''

      const existingLD = document.getElementById('ldArticle')
      if (existingLD) existingLD.remove()
      const ld = document.createElement('script')
      ld.id = 'ldArticle'
      ld.type = 'application/ld+json'
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": post.title,
        "description": post.excerpt || '',
        "image": post.image_url || 'https://stripmate.id/STRIPMATELOGO.png',
        "author": { "@type": "Person", "name": post.author || 'STRIPMATE' },
        "datePublished": post.published_at || post.created_at,
        "publisher": { "@type": "Organization", "name": "STRIPMATE", "logo": { "@type": "ImageObject", "url": "https://stripmate.id/STRIPMATELOGO.png" } }
      })
      document.head.appendChild(ld)

      document.getElementById('loadingPost').style.display = 'none'
      const container = document.getElementById('postContent')
      container.style.display = 'block'

      container.innerHTML = `
        <div class="post-header">
          <div class="tags">${(post.tags || []).map(t => `<span>${escapeHtml(t)}</span>`).join('')}</div>
          <h1>${escapeHtml(post.title)}</h1>
          <div class="meta">${formatDate(post.published_at)} &middot; ${escapeHtml(post.author || 'STRIPMATE')}</div>
        </div>
        ${post.image_url ? `<img class="post-image" src="${post.image_url}" alt="${escapeHtml(post.title)}" />` : ''}
        <div class="post-content">${post.content || ''}</div>
      `
    }
    loadPost()
  </script>
</body>
</html>
