<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - STRIPMATE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/whatsapp.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--navy:#1B2A4A;--navy-light:#2C4266;--green:#2D6A4F;--green-light:#40916C;--orange:#F97316;--orange-light:#FB923C;--cream:#FFF8F0;--gray:#E9ECEF;--gray-light:#F8F9FA;--text:#0F172A;--text-muted:#94A3B8;--white:#FFFFFF;--glass-bg:rgba(255,255,255,0.78);--glass-border:rgba(255,255,255,0.3);--glass-shadow:0 8px 32px rgba(0,0,0,0.06);--shadow:0 4px 24px rgba(0,0,0,0.06);--shadow-lg:0 12px 48px rgba(0,0,0,0.08);--radius:1rem;--radius-sm:0.6rem;--radius-xs:0.4rem}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(45,106,79,0.04) 0%,transparent 50%);color:var(--text);min-height:100vh;line-height:1.6}
    h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;letter-spacing:-0.03em;line-height:1.3}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    .dash-header{
      background:linear-gradient(135deg,var(--navy),var(--navy-light));
      color:#fff;padding:0.75rem 0;position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(27,42,74,0.15)
    }
    .dash-header .container{display:flex;align-items:center;justify-content:space-between}
    .dash-header .logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.03em;display:flex;align-items:center;gap:0.4rem}
    .dash-header .nav-right{display:flex;align-items:center;gap:1rem}
    .dash-header .nav-right a{color:rgba(255,255,255,0.65);font-size:0.85rem;font-weight:500;transition:all.2s;padding:0.3rem 0.6rem;border-radius:0.4rem}
    .dash-header .nav-right a:hover{color:#fff;background:rgba(255,255,255,0.08)}
    .dash-header .logout-btn{
      background:rgba(255,255,255,0.06);padding:0.4rem 1.1rem;
      border-radius:999px;font-size:0.8rem;cursor:pointer;
      border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);
      font-family:inherit;font-weight:600;transition:all 0.2s
    }
    .dash-header .logout-btn:hover{background:rgba(249,115,22,0.2);border-color:rgba(249,115,22,0.3);color:var(--orange)}

    .container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
    .dash-main{padding:2rem 0}

    .greeting{font-size:1.4rem;color:var(--navy);margin-bottom:0.2rem}
    .greeting-sub{color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--gray)}

    .tab-nav{display:flex;gap:0.35rem;margin-bottom:1.5rem;flex-wrap:wrap;border-bottom:1px solid var(--gray);padding-bottom:0.5rem}
    .tab-nav button{
      background:var(--glass-bg);backdrop-filter:blur(8px);
      border:1px solid transparent;
      padding:0.45rem 1rem;font-family:inherit;
      font-size:0.85rem;font-weight:600;color:var(--text-muted);
      cursor:pointer;transition:all 0.2s;border-radius:0.4rem;position:relative
    }
    .tab-nav button:hover{color:var(--text);border-color:var(--glass-border);background:rgba(255,255,255,0.5)}
    .tab-nav button.active{color:var(--orange);background:rgba(249,115,22,0.08);border-color:rgba(249,115,22,0.2)}
    .tab-nav button.active::after{content:'';position:absolute;bottom:-0.5rem;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--orange);border-radius:2px}
    .tab-content{display:none}
    .tab-content.active{display:block}

    .card{
      background:var(--glass-bg);backdrop-filter:blur(12px);
      border-radius:var(--radius-sm);padding:1.5rem;
      box-shadow:var(--glass-shadow);margin-bottom:1rem;
      border:1px solid var(--glass-border);transition:all 0.3s
    }
    .card h3{font-size:1rem;color:var(--navy);margin-bottom:0.75rem}
    .card:hover{box-shadow:var(--shadow-lg);background:rgba(255,255,255,0.88)}

    .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
    .stat-card{
      background:var(--glass-bg);backdrop-filter:blur(12px);
      border-radius:var(--radius-sm);padding:1.25rem 1.5rem;
      box-shadow:var(--glass-shadow);border:1px solid var(--glass-border);
      position:relative;overflow:hidden;transition:all 0.3s
    }
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--orange-light))}
    .stat-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);background:rgba(255,255,255,0.9)}
    .stat-card .label{font-size:0.78rem;color:var(--text-muted);margin-bottom:0.2rem;font-weight:500}
    .stat-card .value{font-size:1.4rem;font-weight:800;color:var(--navy);letter-spacing:-0.02em}

    .booking-item{
      display:flex;justify-content:space-between;align-items:center;
      flex-wrap:wrap;gap:1rem;padding:1rem 1.25rem;
      background:var(--glass-bg);backdrop-filter:blur(8px);
      border:1px solid var(--glass-border);border-radius:var(--radius-sm);
      margin-bottom:0.6rem;transition:all 0.25s
    }
    .booking-item:hover{box-shadow:var(--shadow-lg);background:rgba(255,255,255,0.9);transform:translateY(-1px)}
    .booking-item .info h4{font-size:0.92rem;color:var(--navy);margin-bottom:0.1rem}
    .booking-item .info p{font-size:0.82rem;color:var(--text-muted)}
    .booking-item .right{text-align:right}
    .booking-item .right .price{font-weight:700;color:var(--orange);font-size:0.95rem}
    .booking-item .right .date{font-size:0.75rem;color:var(--text-muted)}

    .badge{display:inline-flex;align-items:center;gap:0.25rem;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.72rem;font-weight:700;white-space:nowrap}
    .badge-pending{background:rgba(249,115,22,0.1);color:var(--orange)}
    .badge-paid,.badge-confirmed{background:rgba(45,106,79,0.1);color:var(--green)}
    .badge-cancelled{background:rgba(239,68,68,0.1);color:#EF4444}
    .badge-dp{background:rgba(249,115,22,0.1);color:var(--orange)}
    .badge-shipped{background:rgba(45,106,79,0.1);color:var(--green)}
    .badge-received{background:rgba(27,42,74,0.08);color:var(--navy)}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      gap:0.3rem;padding:0.45rem 1rem;border-radius:999px;
      font-weight:600;font-size:0.78rem;border:none;
      cursor:pointer;transition:all 0.25s;font-family:inherit;white-space:nowrap;line-height:1.4
    }
    .btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange-light));color:#fff;box-shadow:0 2px 8px rgba(249,115,22,0.2)}
    .btn-primary:hover{box-shadow:0 6px 20px rgba(249,115,22,0.35);transform:translateY(-2px)}
    .btn-outline{background:var(--glass-bg);backdrop-filter:blur(4px);color:var(--text);border:1px solid var(--glass-border)}
    .btn-outline:hover{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,0.06)}
    .btn-green{background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;box-shadow:0 2px 8px rgba(45,106,79,0.2)}
    .btn-green:hover{box-shadow:0 6px 20px rgba(45,106,79,0.35);transform:translateY(-2px)}
    .btn-sm{padding:0.35rem 0.8rem;font-size:0.72rem}

    .profile-form{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .profile-form .full{grid-column:1/-1}
    .form-group{margin-bottom:0}
    .form-group label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.3rem;color:var(--text)}
    .form-group input,.form-group textarea{
      width:100%;padding:0.6rem 0.9rem;border-radius:0.5rem;
      border:1px solid var(--glass-border);
      background:var(--glass-bg);backdrop-filter:blur(4px);
      font-family:inherit;font-size:0.88rem;color:var(--text);transition:all 0.2s
    }
    .form-group input:focus,.form-group textarea:focus{
      outline:none;border-color:var(--orange);
      box-shadow:0 0 0 3px rgba(249,115,22,0.1);background:rgba(255,255,255,0.9)
    }
    .form-group input:disabled{background:var(--gray-light);opacity:0.6;cursor:not-allowed}

    .blog-card{
      display:flex;gap:1rem;padding:1rem;
      background:var(--glass-bg);backdrop-filter:blur(8px);
      border:1px solid var(--glass-border);border-radius:var(--radius-sm);
      margin-bottom:0.6rem;transition:all 0.25s
    }
    .blog-card:hover{box-shadow:var(--shadow-lg);background:rgba(255,255,255,0.9);transform:translateY(-1px)}
    .blog-card .thumb{width:140px;height:100px;border-radius:var(--radius-xs);overflow:hidden;flex-shrink:0}
    .blog-card .thumb img{width:100%;height:100%;object-fit:cover}
    .blog-card .info h4{font-size:0.9rem;color:var(--navy);margin-bottom:0.15rem}
    .blog-card .info .meta{font-size:0.75rem;color:var(--text-muted);margin-bottom:0.2rem}
    .blog-card .info p{font-size:0.82rem;color:var(--text-muted);line-height:1.5}

    .empty-state{text-align:center;padding:3rem;color:var(--text-muted);font-size:0.9rem}

    @media(max-width:768px){
      .profile-form{grid-template-columns:1fr}
      .blog-card{flex-direction:column}
      .blog-card .thumb{width:100%;height:160px}
      .booking-item{flex-direction:column;align-items:flex-start}
      .booking-item .right{text-align:left}
      .stat-row{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
      .dash-main{padding:1rem 0}
    }
    @media(max-width:480px){.tab-nav button{padding:0.35rem 0.75rem;font-size:0.8rem}.card{padding:1rem}}
  </style>
</head>
<body>
  <header class="dash-header">
    <div class="container">
      <a href="index.html" class="logo"><img src="Logo stripmate.png" alt="STRIPMATE" style="height:28px;width:auto;display:block;filter:brightness(0) invert(1)"/></a>
      <div class="nav-right">
        <a href="index.html">Beranda</a>
        <a href="blog.html">Blog</a>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <div class="container">
      <div id="loadingState" class="empty-state">
        <div style="width:36px;height:36px;border:3px solid var(--gray);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 0.75rem"></div>
        <p>Memuat dashboard...</p>
      </div>

      <div id="dashContent" style="display:none">
        <p class="greeting" id="greeting">Halo, <span id="userName">...</span> 👋</p>
        <p class="greeting-sub" id="userInfo">STRIPMATE Member</p>

        <div class="stat-row" id="statRow"></div>

        <div class="tab-nav">
          <button class="active" onclick="switchTab('trips', this)">My Trips</button>
          <button onclick="switchTab('payments', this)">Pembayaran</button>
          <button onclick="switchTab('invoices', this)">Invoice</button>
          <button onclick="switchTab('tickets', this)">E-Ticket</button>
          <button onclick="switchTab('certificates', this)">Sertifikat</button>
          <button onclick="switchTab('merch', this)">Merchandise</button>
          <button onclick="switchTab('profile', this)">Profil</button>
        </div>

        <div id="tabTrips" class="tab-content active"></div>
        <div id="tabPayments" class="tab-content"></div>
        <div id="tabInvoices" class="tab-content"></div>
        <div id="tabTickets" class="tab-content"></div>
        <div id="tabCertificates" class="tab-content"></div>
        <div id="tabMerch" class="tab-content"></div>
        <div id="tabProfile" class="tab-content"></div>
      </div>
    </div>
  </main>

  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <script>
    let session = null
    let bookingsCache = []

    async function init() {
      session = await requireAuth()
      if (!session) return
      const p = session.profile
      if (!p) {
        document.getElementById('loadingState').innerHTML = '<p>Gagal memuat profil. Silakan login ulang.</p>'
        return
      }
      document.getElementById('userName').textContent = p.full_name || 'Peserta'
      document.getElementById('userInfo').textContent = p.school || 'STRIPMATE Member'
      document.getElementById('loadingState').style.display = 'none'
      document.getElementById('dashContent').style.display = 'block'
      await loadDashboard()
    }

    async function loadDashboard() {
      await Promise.all([
        loadTrips(),
        loadProfile()
      ])
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
      const map = { trips:'tabTrips', payments:'tabPayments', invoices:'tabInvoices', tickets:'tabTickets', certificates:'tabCertificates', merch:'tabMerch', profile:'tabProfile' }
      document.getElementById(map[tab]).classList.add('active')
      if (tab === 'payments') loadPayments()
      if (tab === 'invoices') loadInvoices()
      if (tab === 'tickets') loadTickets()
      if (tab === 'certificates') loadCertificates()
      if (tab === 'merch') loadMerchandise()
    }

    async function loadTrips() {
      const container = document.getElementById('tabTrips')
      showLoading(container, 'Memuat trip...')
      const { data: bookings, error } = await supabaseClient
        .from('bookings')
        .select('*, trips(*)')
        .eq('user_id', session.user.id)
        .order('created_at', { ascending: false })
      if (error) return showError(container, 'Gagal memuat data.')
      bookingsCache = bookings || []
      if (!bookings || bookings.length === 0) {
        return showEmpty(container, 'Belum ada trip yang kamu ikuti. <a href="index.html#upcoming" style="color:var(--orange)">Lihat trip tersedia &rarr;</a>')
      }
      updateStats()
      container.innerHTML = bookings.map(b => `
        <div class="booking-item">
          <div class="info">
            <h4>${escapeHtml(b.trips?.title || 'Trip')}</h4>
            <p>Invoice: ${escapeHtml(b.invoice_number)} &middot; ${getStatusBadge(b.status)} &middot; ${getStatusBadge(b.payment_status)}</p>
          </div>
          <div class="right">
            <div class="price">${formatCurrency(b.total_amount)}</div>
            <div class="date">${formatDate(b.created_at)}</div>
          </div>
        </div>
      `).join('')
    }

    function updateStats() {
      const total = bookingsCache.length
      const paid = bookingsCache.filter(b => b.payment_status === 'paid').length
      const pending = bookingsCache.filter(b => b.payment_status === 'dp').length
      document.getElementById('statRow').innerHTML = `
        <div class="stat-card"><div class="label">Total Trip</div><div class="value">${total}</div></div>
        <div class="stat-card"><div class="label">Lunas</div><div class="value">${paid}</div></div>
        <div class="stat-card"><div class="label">Pending</div><div class="value">${pending}</div></div>
      `
    }

    async function loadPayments() {
      const container = document.getElementById('tabPayments')
      showLoading(container, 'Memuat pembayaran...')
      const bookingIds = bookingsCache.map(b => b.id)
      if (bookingIds.length === 0) return showEmpty(container, 'Belum ada pembayaran.')
      const { data: payments, error } = await supabaseClient
        .from('payments')
        .select('*, bookings:booking_id(invoice_number)')
        .in('booking_id', bookingIds)
        .order('created_at', { ascending: false })
      if (error) return showError(container, 'Gagal memuat data.')
      if (!payments || payments.length === 0) return showEmpty(container, 'Belum ada pembayaran.')
      container.innerHTML = payments.map(p => {
        const booking = bookingsCache.find(b => b.id === p.booking_id)
        const tripTitle = booking?.trips?.title || 'Trip'
        return `
          <div class="booking-item">
            <div class="info">
              <h4>${escapeHtml(tripTitle)}</h4>
              <p>${p.method ? 'Metode: ' + p.method.toUpperCase() : ''} &middot; ${getStatusBadge(p.status)}</p>
            </div>
            <div class="right">
              <div class="price">${formatCurrency(p.amount)}</div>
              <div class="date">${formatDate(p.created_at)}</div>
            </div>
          </div>
        `
      }).join('')
    }

    async function loadInvoices() {
      const container = document.getElementById('tabInvoices')
      const data = bookingsCache
      if (!data || data.length === 0) return showEmpty(container, 'Belum ada invoice.')
      container.innerHTML = data.map(b => `
        <div class="booking-item">
          <div class="info">
            <h4>Invoice ${escapeHtml(b.invoice_number)}</h4>
            <p>${escapeHtml(b.trips?.title || '')} &middot; ${getStatusBadge(b.status)}</p>
          </div>
          <div class="right">
            <div class="price">${formatCurrency(b.total_amount)}</div>
            <button class="btn btn-outline" onclick="alert('Download invoice: ${b.invoice_number}')">Download</button>
          </div>
        </div>
      `).join('')
    }

    async function loadTickets() {
      const container = document.getElementById('tabTickets')
      showLoading(container, 'Memuat e-ticket...')
      const bookingIds = bookingsCache.map(b => b.id)
      if (bookingIds.length === 0) return showEmpty(container, 'Belum ada e-ticket.')
      const { data: tickets, error } = await supabaseClient
        .from('e_tickets')
        .select('*, bookings:booking_id(invoice_number)')
        .in('booking_id', bookingIds)
        .order('issued_at', { ascending: false })
      if (error) return showError(container, 'Gagal memuat data.')
      if (!tickets || tickets.length === 0) return showEmpty(container, 'Belum ada e-ticket. E-ticket akan tersedia setelah pembayaran dikonfirmasi.')
      container.innerHTML = tickets.map(t => {
        const booking = bookingsCache.find(b => b.id === t.booking_id)
        const tripTitle = booking?.trips?.title || 'E-Ticket'
        return `
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
              <div>
                <h3 style="margin-bottom:0.25rem">${escapeHtml(tripTitle)}</h3>
                <p style="font-size:0.85rem;color:var(--text-muted)">Ticket: ${escapeHtml(t.ticket_number)}</p>
                <p style="font-size:0.8rem;color:var(--text-muted)">Issued: ${formatDate(t.issued_at)}</p>
              </div>
              <div style="text-align:center">
                <div style="width:80px;height:80px;background:var(--gray);border-radius:0.4rem;display:flex;align-items:center;justify-content:center;margin:0 auto 0.3rem;font-size:2rem;color:var(--text-muted)">&#128274;</div>
                <button class="btn btn-primary btn-sm" onclick="alert('Download QR Code')">Download</button>
              </div>
            </div>
          </div>
        `
      }).join('')
    }

    async function loadCertificates() {
      const container = document.getElementById('tabCertificates')
      showLoading(container, 'Memuat sertifikat...')
      const { data: certs, error } = await supabaseClient
        .from('certificates')
        .select('*, trips(title)')
        .eq('user_id', session.user.id)
        .order('issued_at', { ascending: false })
      if (error) return showError(container, 'Gagal memuat data.')
      if (!certs || certs.length === 0) return showEmpty(container, 'Belum ada sertifikat. Sertifikat akan tersedia setelah trip selesai.')
      container.innerHTML = certs.map(c => `
        <div class="booking-item">
          <div class="info">
            <h4>Sertifikat ${escapeHtml(c.trips?.title || '')}</h4>
            <p>No: ${escapeHtml(c.certificate_number)} &middot; ${formatDate(c.issued_at)}</p>
          </div>
          <div class="right">
            <button class="btn btn-green btn-sm" onclick="alert('Download sertifikat')">Download</button>
          </div>
        </div>
      `).join('')
    }

    async function loadMerchandise() {
      const container = document.getElementById('tabMerch')
      showLoading(container, 'Memuat merchandise...')
      const bookingIds = bookingsCache.map(b => b.id)
      if (bookingIds.length === 0) return showEmpty(container, 'Belum ada merchandise.')
      const { data: merch, error } = await supabaseClient
        .from('merchandise')
        .select('*, bookings:booking_id(invoice_number)')
        .in('booking_id', bookingIds)
        .order('status', { ascending: true })
      if (error) return showError(container, 'Gagal memuat data.')
      if (!merch || merch.length === 0) return showEmpty(container, 'Belum ada merchandise.')
      container.innerHTML = merch.map(m => {
        const booking = bookingsCache.find(b => b.id === m.booking_id)
        const tripTitle = booking?.trips?.title || ''
        return `
          <div class="booking-item">
            <div class="info">
              <h4>${escapeHtml(m.item_name)}</h4>
              <p>${escapeHtml(tripTitle)} &middot; ${getStatusBadge(m.status)}</p>
            </div>
            <div class="right">
              <span class="badge badge-${m.status}">${m.status}</span>
              <p style="font-size:0.8rem;color:var(--text-muted);margin-top:0.2rem">Qty: ${m.quantity}</p>
            </div>
          </div>
        `
      }).join('')
    }

    async function loadProfile() {
      const p = session.profile
      const container = document.getElementById('tabProfile')
      container.innerHTML = `
        <div class="card">
          <div class="profile-form">
            <div class="form-group full" style="display:flex;align-items:center;gap:1rem">
              <div style="position:relative">
                <img id="avatarPreview" src="${p.avatar_url || 'https://i.pravatar.cc/80?img=' + Math.floor(Math.random()*70)}" alt="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--glass-border)" />
                <label for="avatarUpload" style="position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer;border:2px solid #fff">&#9998;</label>
                <input type="file" accept="image/*" id="avatarUpload" style="display:none" onchange="uploadAvatar(this)" />
              </div>
              <div>
                <strong style="font-size:1.1rem">${escapeHtml(p.full_name || '')}</strong>
                <p style="font-size:0.8rem;color:var(--text-muted)">${escapeHtml(p.email || '')}</p>
              </div>
            </div>
            <div class="form-group">
              <label>Nama Lengkap</label>
              <input type="text" id="pName" value="${escapeHtml(p.full_name || '')}" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="pEmail" value="${escapeHtml(p.email || '')}" disabled style="opacity:0.6" />
            </div>
            <div class="form-group">
              <label>Nomor WhatsApp</label>
              <input type="tel" id="pPhone" value="${escapeHtml(p.phone || '')}" />
            </div>
            <div class="form-group">
              <label>Sekolah / Universitas</label>
              <input type="text" id="pSchool" value="${escapeHtml(p.school || '')}" />
            </div>
            <div class="form-group">
              <label>Umur</label>
              <input type="number" id="pAge" value="${p.age || ''}" />
            </div>
            <div class="form-group">
              <label>Domisili</label>
              <input type="text" id="pDomisili" value="${escapeHtml(p.domisili || '')}" />
            </div>
            <div class="form-group full">
              <button class="btn btn-primary" onclick="saveProfile()">Simpan Profil</button>
            </div>
          </div>
        </div>
        <div class="card">
          <h3>Blog & Journal Terbaru</h3>
          <div id="blogPreview"></div>
        </div>
      `
      loadBlogPreview()
    }

    async function loadBlogPreview() {
      const container = document.getElementById('blogPreview')
      const { data: posts, error } = await supabaseClient
        .from('blog_posts')
        .select('title, slug, excerpt, image_url, published_at')
        .eq('published', true)
        .order('published_at', { ascending: false })
        .limit(3)
      if (error || !posts || posts.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">Belum ada artikel.</p>'
        return
      }
      container.innerHTML = posts.map(p => `
        <a href="blog-post.html?slug=${p.slug}" class="blog-card" style="display:flex;text-decoration:none">
          <div class="thumb"><img src="${p.image_url || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=300&q=80'}" alt=""/></div>
          <div class="info">
            <h4>${escapeHtml(p.title)}</h4>
            <div class="meta">${formatDate(p.published_at)}</div>
            <p>${escapeHtml(p.excerpt || '')}</p>
          </div>
        </a>
      `).join('')
    }

    async function uploadAvatar(input) {
      const file = input.files[0]; if (!file) return
      try {
        const ext = file.name.split('.').pop()
        const path = `avatars/${session.user.id}_${Date.now()}.${ext}`
        const { error: upErr } = await supabaseClient.storage.from('avatars').upload(path, file, { upsert: true })
        if (upErr) throw upErr
        const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(path)
        const { error: updateErr } = await supabaseClient.from('profiles').update({ avatar_url: publicUrl }).eq('id', session.user.id)
        if (updateErr) throw updateErr
        document.getElementById('avatarPreview').src = publicUrl + '?t=' + Date.now()
        session.profile.avatar_url = publicUrl
        showToast('Foto profil berhasil diupdate!', 'success')
      } catch(e) {
        showToast('Gagal upload foto: ' + e.message, 'error')
      }
    }

    async function saveProfile() {
      const data = {
        full_name: document.getElementById('pName').value.trim(),
        phone: document.getElementById('pPhone').value.trim(),
        school: document.getElementById('pSchool').value.trim(),
        age: parseInt(document.getElementById('pAge').value) || null,
        domisili: document.getElementById('pDomisili').value.trim()
      }
      try {
        await updateProfile(session.user.id, data)
        alert('Profil berhasil disimpan!')
      } catch (e) {
        alert('Gagal menyimpan profil: ' + e.message)
      }
    }

    function handleLogout() {
      if (confirm('Yakin ingin logout?')) logout()
    }

    init()
  </script>
</body>
</html>
